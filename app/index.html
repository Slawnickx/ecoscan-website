<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/ecoscan-website/app/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="EcoScan - Smart Food Management">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="EcoScan">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>EcoScan</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <style>
    body { margin: 0; background: #2D6A4F; }
    #loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: #2D6A4F;
      transition: opacity 0.4s ease-out; z-index: 999;
    }
    #loading.fade-out { opacity: 0; pointer-events: none; }
    #loading img { width: 80px; height: 80px; animation: pulse 1.5s ease-in-out infinite; }
    #loading h1 { color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 26px; font-weight: 600; margin: 16px 0 6px; letter-spacing: 1px; }
    #loading p { color: rgba(255,255,255,0.7); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px; margin: 0; }
    #loading .spinner { width: 28px; height: 28px; border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-top: 28px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
  </style>
  <div id="loading">
    <img src="icons/Icon-192.png" alt="EcoScan">
    <h1>EcoScan</h1>
    <p>Smart Food Management</p>
    <div class="spinner"></div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('loading');
      if (el) { el.classList.add('fade-out'); setTimeout(function() { el.remove(); }, 400); }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
